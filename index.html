<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000000, #1a1a2e);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    /* SVG container */
    object {
      width: 90%;
      max-width: 900px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
      animation: fadeIn 2s ease-in-out;
    }

    /* Fade animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

  </style>
</head>

<body>

  <!-- ✅ Your SVG file -->
  <object 
    type="image/svg+xml" 
    data="wedding-invite.svg">
  </object>

</body>
</html>
